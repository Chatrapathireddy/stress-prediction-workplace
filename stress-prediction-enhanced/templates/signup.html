{% extends "layout.html" %}
{% block title %}Sign Up — StressIQ{% endblock %}
{% block content %}
<div class="container py-5" style="max-width:440px">
  <div class="text-center mb-4">
    <h2 style="font-size:1.8rem;font-weight:800">Create account</h2>
    <p style="color:var(--muted);font-size:.9rem">Join StressIQ to track and manage your workplace stress</p>
  </div>
  <div class="card">
    <div class="card-body" style="padding:2rem">
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" class="form-control" name="username" required placeholder="Choose a username">
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" name="email" required placeholder="your@email.com">
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" name="password" required placeholder="Create a password">
        </div>
        <div class="mb-4">
          <label class="form-label">Confirm Password</label>
          <input type="password" class="form-control" name="confirm_password" required placeholder="Repeat password">
        </div>
        <button type="submit" class="btn-prime w-100" style="border:none">Create Account</button>
      </form>
      <p class="text-center mt-3 mb-0" style="font-size:.88rem;color:var(--muted)">
        Already have an account? <a href="{{ url_for('login') }}" style="color:var(--accent)">Sign in</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
